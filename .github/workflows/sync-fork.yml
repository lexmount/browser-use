name: Sync Fork

on:
  schedule:
    - cron: '7 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Sync fork via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            repos/lexmount/browser-use/merge-upstream \
            -f branch=main
